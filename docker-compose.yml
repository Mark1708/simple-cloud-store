services:
  db:
    container_name: store-db
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${DB_USER:-cs_user}
      POSTGRES_PASSWORD: ${DB_PASS:-change-me}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U ${DB_USER:-cs_user} -d ${POSTGRES_DB:-postgres}'" ]
      interval: 3s
      timeout: 5s
      retries: 5
    restart: always
    volumes:
      - ./init:/docker-entrypoint-initdb.d

  catalog:
    container_name: catalog
    image: catalog
    build:
      context: ./catalog-spring-boot
      dockerfile: ./Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: ${DB_USER:-cs_user}
      DB_PASS: ${DB_PASS:-change-me}
    depends_on:
      - db

  inventory:
    container_name: inventory
    image: inventory
    build:
      context: ./inventory-quarkus
      dockerfile: ./Dockerfile
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: inventory_db
      DB_USER: ${DB_USER:-cs_user}
      DB_PASS: ${DB_PASS:-change-me}
    depends_on:
      - db

  gateway:
    container_name: gateway
    image: gateway
    build:
      context: ./gateway-vertx
      dockerfile: ./Dockerfile
    environment:
      HTTP_PORT: 8080
      CATALOG_HOST: catalog
      CATALOG_PORT: 8080
      INVENTORY_HOST: inventory
      INVENTORY_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - catalog
      - inventory

  web:
    container_name: web
    image: web
    build:
      context: ./web-nodejs-angular
      dockerfile: ./Dockerfile
    environment:
      PORT: 3000
      COOLSTORE_GW_ENDPOINT: http://gateway:8080
    ports:
      - "3000:3000"
    depends_on:
      - gateway
